schema = "sim.features"

[enforcement.audience]
code = "strict"
framework = "strict"

[enforcement.specimen]
user = "strict"
framework = "strict"
code = "advisory"

[enforcement.route]
major_entrypoints = "advisory"
frameworks = "advisory"

[[feature]]
id = "feature/sim-femm/generated-docs"
title = "Repository documentation surface"
summary = "Publish generated package, card, rustdoc, and index facts for the FEMM domain crates."
owner = "crate/xtask"
audiences = ["code"]
guidance = "Use this row when checking the generated documentation and index lane for FEMM."
claims_anchors = [
  "anchor/cli/xtask",
  "anchor/crate/xtask",
  "anchor/doc/generated/card-index",
  "anchor/doc/generated/feature-map",
  "anchor/doc/generated/provenance",
  "anchor/doc/generated/repo-contract",
  "anchor/doc/generated/rustdoc-index",
  "anchor/doc/generated/sim-index-fragment",
  "anchor/repo/sim-femm",
]
claims_surfaces = [
  "cli/xtask",
  "docs/sim-femm/generated",
]

